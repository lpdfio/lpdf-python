name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Download WASI binary from core release ───────────────────────────────
      # Derives the core tag from pyproject.toml (strip patch → .0).
      # Falls back to the latest release when the version is a placeholder (0.0.0)
      # or the derived tag does not yet exist.
      - name: Download lpdf-wasi.wasm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p resources
          PYPROJECT_VERSION=$(python -c "
          import re, pathlib
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text(), re.M)
          print(m.group(1) if m else '0.0.0')
          ")
          CORE_TAG="v$(echo "$PYPROJECT_VERSION" | sed 's/\.[0-9]*$/.0/')"
          echo "Resolved core tag: $CORE_TAG"
          for attempt in 1 2 3; do
            gh release download "$CORE_TAG" \
              --repo lpdfio/lpdf \
              --pattern "lpdf-wasi.wasm" \
              --dir resources \
              --clobber && break
            echo "Attempt $attempt failed — retrying in 10s..."
            sleep 10
          done
          # Fallback to latest release when the derived tag doesn't exist yet
          if [ ! -f resources/lpdf-wasi.wasm ]; then
            gh release download \
              --repo lpdfio/lpdf \
              --pattern "lpdf-wasi.wasm" \
              --dir resources \
              --clobber
          fi

      # ── Install wasmtime runtime ─────────────────────────────────────────────
      - name: Install wasmtime
        run: |
          curl -sSf https://wasmtime.dev/install.sh | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Install build tools and test dependencies
        run: pip install hatchling build pytest

      - name: Install package
        run: pip install -e .

      # ── Fetch test fixtures and snapshots from core ──────────────────────────
      - name: Fetch test fixtures and snapshots from core
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/lpdfio/lpdf.git _core
          git -C _core sparse-checkout set test/fixtures test/snapshots
          mkdir -p test/fixtures test/snapshots
          cp -r _core/test/fixtures/. test/fixtures/
          cp -r _core/test/snapshots/. test/snapshots/
          rm -rf _core

      - name: Test
        run: pytest tests -v
