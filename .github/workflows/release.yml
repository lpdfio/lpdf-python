name: Release
run-name: "Release ${{ github.event.client_payload.version || github.ref_name }} to PyPI (${{ github.event_name == 'repository_dispatch' && 'core' || 'adapter' }})"

on:
  repository_dispatch:
    types: [core-release]
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # ── Resolve version ──────────────────────────────────────────────────────
      - name: Resolve version
        run: |
          ADAPTER_TAG="${{ github.event.client_payload.version || github.ref_name }}"
          CORE_TAG=$(echo "$ADAPTER_TAG" | sed 's/\.[0-9]*$/.0/')
          VERSION="${ADAPTER_TAG#v}"
          echo "ADAPTER_TAG=$ADAPTER_TAG"   >> "$GITHUB_ENV"
          echo "CORE_TAG=$CORE_TAG"         >> "$GITHUB_ENV"
          echo "VERSION=$VERSION"           >> "$GITHUB_ENV"

      # ── Download WASI binary from core release ───────────────────────────────
      # Python adapter expects resources/lpdf-wasi.wasm
      - name: Download lpdf-wasi.wasm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p resources
          for attempt in 1 2 3; do
            gh release download "$CORE_TAG" \
              --repo lpdfio/lpdf \
              --pattern "lpdf-wasi.wasm" \
              --dir resources && break
            echo "Attempt $attempt failed — retrying in 10s..."
            sleep 10
          done

      # ── Install wasmtime runtime ─────────────────────────────────────────────
      - name: Install wasmtime
        run: |
          curl -sSf https://wasmtime.dev/install.sh | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      # ── Set version ──────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set version in pyproject.toml
        run: sed -i "s|^version = \".*\"|version = \"$VERSION\"|" pyproject.toml

      # ── Install and test ─────────────────────────────────────────────────────
      - name: Install build tools and test dependencies
        run: pip install hatchling build twine pytest

      - name: Install package
        run: pip install -e .

      # ── Fetch test fixtures and snapshots from core ──────────────────────────
      # The fixture XML files and golden SHA-256 snapshots live in the core
      # monorepo (lpdfio/lpdf).  Sparse-clone only those two directories so
      # that snapshot tests can actually run in this adapter's CI.
      - name: Fetch test fixtures and snapshots from core
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/lpdfio/lpdf.git _core
          git -C _core sparse-checkout set test/fixtures test/snapshots
          mkdir -p test/fixtures test/snapshots
          cp -r _core/test/fixtures/. test/fixtures/
          cp -r _core/test/snapshots/. test/snapshots/
          rm -rf _core

      - name: Test
        run: pytest tests -v

      # ── Build and publish to PyPI ─────────────────────────────────────────────
      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      # ── Create GitHub Release (core-triggered only) ──────────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "$ADAPTER_TAG"
          git push origin "$ADAPTER_TAG"
          gh release create "$ADAPTER_TAG" \
            --title "$ADAPTER_TAG" \
            --generate-notes
